name: Benchmark

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  benchmark:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      # ── Toolchain ──────────────────────────────────────────────────────────

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.17.2"
          otp-version: "27.0.1"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.4"
          bundler-cache: true
          working-directory: rails_app

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.11.0"

      - name: Install k6
        uses: grafana/setup-k6-action@v1

      - name: Install bench deps
        run: cd bench && npm install ws

      # ── App setup ──────────────────────────────────────────────────────────

      - name: Set up Phoenix DB
        working-directory: phoenix_app
        env:
          DATABASE_USERNAME: postgres
          DATABASE_PASSWORD: postgres
          MIX_ENV: dev
        run: |
          mix local.hex --force
          mix local.rebar --force
          mix deps.get
          mix ecto.create
          mix ecto.migrate

      - name: Set up Rails DB
        working-directory: rails_app
        env:
          DATABASE_USERNAME: postgres
          DATABASE_PASSWORD: postgres
          RAILS_ENV: development
        run: bin/rails db:create db:migrate

      # ── Start servers ──────────────────────────────────────────────────────

      - name: Start Phoenix server
        working-directory: phoenix_app
        env:
          DATABASE_USERNAME: postgres
          DATABASE_PASSWORD: postgres
          MIX_ENV: dev
        run: mix phx.server &

      - name: Start Rails server
        working-directory: rails_app
        env:
          DATABASE_USERNAME: postgres
          DATABASE_PASSWORD: postgres
          RAILS_ENV: development
        run: bin/rails server &

      - name: Wait for both servers to be ready
        run: |
          for url in http://localhost:4000 http://localhost:3000; do
            echo "Waiting for $url..."
            for i in $(seq 1 30); do
              curl -sf "$url" > /dev/null && echo "$url is up" && break
              sleep 2
            done
          done

      # ── Benchmarks ─────────────────────────────────────────────────────────

      - name: Create results directory
        run: mkdir -p bench/results

      - name: k6 HTTP — Phoenix
        run: k6 run bench/k6_http.js --env TARGET=phoenix || true

      - name: k6 HTTP — Rails
        run: k6 run bench/k6_http.js --env TARGET=rails || true

      - name: k6 WebSocket — Phoenix
        run: k6 run bench/k6_ws.js --env TARGET=phoenix || true

      - name: k6 WebSocket — Rails
        run: k6 run bench/k6_ws.js --env TARGET=rails || true

      - name: WS flood — Phoenix (500 conns)
        run: node bench/ws_flood.js --target phoenix --conns 500 | tee bench/results/flood_phoenix.txt

      - name: WS flood — Rails (500 conns)
        run: node bench/ws_flood.js --target rails --conns 500 | tee bench/results/flood_rails.txt

      # ── Results ────────────────────────────────────────────────────────────

      - name: Write job summary
        if: always()
        run: node bench/summarize.js

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.sha }}
          path: bench/results/
          retention-days: 90
